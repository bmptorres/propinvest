async function exportAIPDF(p,a,ai){
  if(!p||!a){showToast('Sem dados para exportar');return;}
  showToast('A gerar PDF...');
  try{
    const{jsPDF}=window.jspdf;
    if(!jsPDF)throw new Error('jsPDF nao carregado');
    const doc=new jsPDF({orientation:'p',unit:'mm',format:'a4'});
    const W=doc.internal.pageSize.getWidth();
    const H=doc.internal.pageSize.getHeight();
    const M=16;
    // Cores
    const DK=[55,62,67],WH=[255,255,255],BK=[15,23,42];
    const AM=[245,158,11],BL=[59,130,246],GR=[16,185,129],RD=[239,68,68],PU=[139,92,246];
    const GY=[148,163,184],LG=[248,250,252],LGBORDER=[220,225,230];
    let y=0;

    // Helper: nova pagina se necessario
    const checkPage=(needed)=>{
      if(y+needed>H-22){addFooterPage(doc,W,H,M);doc.addPage();y=20;return true;}
      return false;
    };

    // Helper: linha separadora
    const hr=()=>{
      doc.setDrawColor(...LGBORDER);doc.setLineWidth(0.3);
      doc.line(M,y,W-M,y);y+=5;
    };

    // ── CAPA ─────────────────────────────────────────────────
    doc.setFillColor(...DK);doc.rect(0,0,W,55,'F');
    doc.setFillColor(...AM);doc.rect(0,52,W,3,'F');
    if(typeof LOGO!=='undefined'&&LOGO){
      try{doc.addImage(LOGO,'PNG',W/2-16,7,32,32);}catch(e){}
    }
    doc.setFont('helvetica','bold');doc.setFontSize(8);doc.setTextColor(...WH);
    doc.text('RELATORIO DE INVESTIMENTO IMOBILIARIO',W/2,48,{align:'center'});

    y=65;
    // Nome do projecto
    const nLines=doc.splitTextToSize(p.name||'Projecto de Investimento',W-M*2);
    doc.setFontSize(18);doc.setFont('helvetica','bold');doc.setTextColor(...BK);
    doc.text(nLines,M,y);y+=nLines.length*7+5;

    // Meta linha
    const metaParts=[p.city,p.parish,p.typology,p.areaM2?p.areaM2+'m2':'',p.strategy].filter(Boolean);
    doc.setFontSize(9);doc.setFont('helvetica','normal');doc.setTextColor(...GY);
    doc.text(metaParts.join('  ·  '),M,y);y+=5;
    doc.setFontSize(8);
    doc.text('Gerado em '+new Date().toLocaleDateString('pt-PT')+' · PropInvest Pro · Tessa Advisors',M,y);y+=10;
    doc.setDrawColor(...AM);doc.setLineWidth(0.6);doc.line(M,y,W-M,y);y+=8;

    // ── BANNER VEREDICTO AI ───────────────────────────────────
    const aiVerdict=ai&&(Number(ai.ok)||0);
    if(aiVerdict){
      const vc={excellent:GR,good:GR,fair:AM,poor:RD}[aiVerdict]||AM;
      // Fundo simples sem opacity
      doc.setFillColor(vc[0],vc[1],vc[2]);doc.rect(M,y-2,W-M*2,18,'F');
      doc.setFont('helvetica','bold');doc.setFontSize(12);doc.setTextColor(...WH);
      const vLabel={excellent:'EXCELENTE NEGOCIO ★',good:'BOM NEGOCIO ✓',fair:'NEGOCIO RAZOAVEL',poor:'NEGOCIO FRACO'}[aiVerdict]||'EM ANALISE';
      doc.text(vLabel,W/2,y+7,{align:'center'});
      doc.setFontSize(8);doc.setFont('helvetica','normal');
      const recLabel=(ai.rec||'—').toUpperCase();
      doc.text('Recomendacao: '+recLabel+'   Confianca: '+(ai.conf||'—').toUpperCase(),W/2,y+13,{align:'center'});
      y+=24;
    }

    // ── KPIs ─────────────────────────────────────────────────
    checkPage(60);
    const roi=a.roiNet||0;
    const profColor=(a.netProfit||0)>=0?GR:RD;
    const roiColor=roi>=20?GR:roi>=10?AM:RD;
    const kpis=[

      {l:'Capital Total',v:eur(a.capTotal),s:(a.invRes&&a.invRes.length||0)+' investidor(es)',c:BL},

    const costRows=[
      ['Preco de compra',eur(p.purchasePrice||0)],
      ['Custos de aquisicao (IMT, IS, registos)',eur((a.lg?a.lg.imt+a.lg.is+a.lg.reg+a.lg.cert:0))],
      ['Obras e reabilitacao',eur(a.wrkTotal||0)],
      ['Custos de financiamento',eur(a.financingInterestHolding||0)],
      ['Holding/manutencao',eur(a.holdingTotal||0)],
      ['TOTAL INVESTIDO',eur(a.capTotal||0)],

    costRows.forEach(([l,v],i)=>{
      const isTotal=l.startsWith('TOTAL');
      doc.setFont('helvetica',isTotal?'bold':'normal');
      doc.setFontSize(isTotal?9:8);

      else{if(i%2===0){doc.setFillColor(...LG);doc.rect(M,y-3,W-M*2,8,'F');}doc.setTextColor(isTotal?WH[0]:BK[0],isTotal?WH[1]:BK[1],isTotal?WH[2]:BK[2]);}
      doc.text(l,M+3,y+2);doc.text(v,W-M-3,y+2,{align:'right'});
      y+=isTotal?10:8;
    });
    y+=6;

    // ── WATERFALL ─────────────────────────────────────────────
    checkPage(80);
    doc.setFont('helvetica','bold');doc.setFontSize(10);doc.setTextColor(...DK);
    doc.text('WATERFALL FINANCEIRO',M,y);y+=5;
    const wfRows=[
      ['Venda de referencia',eur(a.saleRef||0),true,false],
      ['Comissao AMI + custos venda','-'+eur((a.ami||0)+(a.saleOth||0)),false,false],
      ['Venda liquida',eur(a.saleNet||0),true,false],
      ['Capital a reembolsar','-'+eur(a.capTotal||0),false,false],
      ['Lucro bruto',(a.profit>=0?'':'-')+eur(Math.abs(a.profit||0)),(a.profit||0)>=0,false],
      ['Imposto mais-valias (50%x28%)','-'+eur(a.taxTotal||0),false,false],
      ['LUCRO LIQUIDO POS-IMPOSTO',eur(a.netProfit||0),(a.netProfit||0)>=0,true],
    ];
    wfRows.forEach(([l,v,pos,hi],i)=>{
      const ry=y;
      if(hi){
        doc.setFillColor(...GR);doc.rect(M,ry-3,W-M*2,9,'F');
        doc.setTextColor(...WH);
      }else if(i%2===0){
        doc.setFillColor(...LG);doc.rect(M,ry-3,W-M*2,8,'F');
        doc.setTextColor(...GY);
      }else{
        doc.setTextColor(...GY);
      }
      doc.setFont('helvetica',hi?'bold':'normal');doc.setFontSize(hi?9:8);
      if(hi)doc.setTextColor(...WH);
      else doc.setTextColor(...(hi?WH:GY));
      doc.text(l,M+3,ry+2);
      doc.setTextColor(...(pos?GR:RD));if(hi)doc.setTextColor(...WH);
      doc.text(v,W-M-3,ry+2,{align:'right'});
      y+=hi?10:8;
    });
    y+=8;

    // ── ESTRUTURA DE CUSTOS (barras) ──────────────────────────
    checkPage(55);
    doc.setFont('helvetica','bold');doc.setFontSize(10);doc.setTextColor(...DK);
    doc.text('ESTRUTURA DE CUSTOS',M,y);y+=6;
    const costBars=[
      ['Aquisicao',a.acqAll||0,AM],
      ['Obras',a.wrkTotal||0,BL],
      ['Venda/Comissoes',(a.ami||0)+(a.saleOth||0),RD],
      ['Imposto',a.taxTotal||0,PU],
    ];
    const totCosts=costBars.reduce((s,c)=>s+(c[1]||0),0);
    const barMaxW=W-M*2-55;
    costBars.forEach(([l,v,c])=>{
      const pv=totCosts>0?(v/totCosts):0;
      doc.setFont('helvetica','normal');doc.setFontSize(8);doc.setTextColor(...GY);
      doc.text(l,M,y+3);
      doc.setFillColor(...LGBORDER);doc.rect(M+38,y-1,barMaxW,6,'F');
      if(pv>0){doc.setFillColor(...c);doc.rect(M+38,y-1,barMaxW*pv,6,'F');}
      doc.setFont('helvetica','bold');doc.setTextColor(...c);
      doc.text(eur(v),W-M,y+3,{align:'right'});
      y+=10;
    });
    y+=5;

    // ── FISCAL ────────────────────────────────────────────────
    checkPage(55);
    doc.setFont('helvetica','bold');doc.setFontSize(10);doc.setTextColor(...DK);
    doc.text('APURAMENTO FISCAL — IRS Cat. G (Art. 43 CIRS)',M,y);y+=4;
    doc.autoTable({
      startY:y,
      head:[['Rubrica','Valor']],
      body:[
        ['Lucro bruto',eur(a.profit||0)],
        ['Base tributavel (inclusao 50%)',eur(a.taxableGain||0)],
        ['Taxa autonoma mais-valias','28%'],
        ['Taxa efectiva sobre lucro','14% (50% x 28%)'],
        ['Imposto estimado','-'+eur(a.taxTotal||0)],
        ['Lucro liquido pos-imposto',eur(a.netProfit||0)],
      ],
      theme:'striped',
      styles:{fontSize:8.5,cellPadding:2.5,font:'helvetica',textColor:BK},
      headStyles:{fillColor:DK,textColor:WH,fontStyle:'bold'},
      columnStyles:{1:{halign:'right',fontStyle:'bold'}},
      margin:{left:M,right:M},
    });
    y=doc.lastAutoTable.finalY+10;

    // ── AVALIACAO DE MERCADO IA ───────────────────────────────
    if(ai&&(Number(ai.med)||Number(ai.val)||ai.marketValuation)){
      const aiMed=ai.med||ai.val||ai.marketValuation||0;
      const aiVmin=ai.vmin||ai.marketValuationMin||0;
      const aiVmax=ai.vmax||ai.marketValuationMax||0;
      const aiPsm=ai.psmMed||ai.psm||ai.marketPricePerM2||0;
      const aiComps=(ai.comps||ai.comparables||[]).filter(c=>c.p>0);
      const aiRisks=(ai.ris||ai.risks||[]).filter(Boolean);
      const aiOps=(ai.ops||ai.opportunities||[]).filter(Boolean);
      const aiSummary=ai.res||ai.summary||ai.executiveSummary||'';
      const aiSaleExp=ai.saleExpected||0;
      const aiPos=Number(ai.pos||0);
      const aiPosText=ai.posText||'';
      const aiLoc=String(ai.loc||p.city||'').replace(/[^\w\s,.-]/g,'');
      const aiNetProfit=Number(ai.netProfit||0);
      const aiRoi=Number(ai.roi||0);

      checkPage(50);
      doc.setFont('helvetica','bold');doc.setFontSize(10);doc.setTextColor(...DK);
      doc.text('AVALIACAO DE MERCADO — PESQUISA IDEALISTA.PT',M,y);y+=5;

      // Caixa de valor de mercado
      // Caixa posicionamento de preco de venda
      const posLbls={'-2':'MUITO ABAIXO DO MERCADO','-1':'ABAIXO DO MERCADO',
        '0':'DENTRO DO MERCADO','1':'ACIMA DO MERCADO','2':'MUITO ACIMA DO MERCADO'};
      const posCols={'-2':BL,'-1':BL,'0':GR,'1':AM,'2':RD};
      const posC=posCols[String(aiPos)]||AM;
      doc.setFillColor(...posC);doc.rect(M,y,W-M*2,28,'F');
      doc.setFont('helvetica','bold');doc.setFontSize(9);doc.setTextColor(...WH);
      doc.text('POSICIONAMENTO DO PRECO DE VENDA',M+4,y+6);
      doc.setFontSize(13);
      doc.text(posLbls[String(aiPos)]||'EM ANALISE',M+4,y+15);
      doc.setFont('helvetica','normal');doc.setFontSize(8);
      doc.text('Preco pedido: '+eur(aiSaleExp)+
        '   Mediana mercado ('+aiLoc+'): '+eur(aiMed)+
        '   Intervalo: '+eur(aiVmin)+' - '+eur(aiVmax),M+4,y+23);
      y+=33;
      if(aiPosText){
        doc.setFont('helvetica','italic');doc.setFontSize(8);doc.setTextColor(...GY);
        const ptL=doc.splitTextToSize(aiPosText,W-M*2-4);
        doc.text(ptL,M,y);y+=ptL.length*4.5+6;
      }
      // Resumo financeiro abaixo da caixa
      doc.setFont('helvetica','normal');doc.setFontSize(8);doc.setTextColor(...GY);
      doc.text('Capital investido: '+eur(a.capTotal||0)+
        '   Lucro liquido estimado: '+eur(aiNetProfit)+
        '   ROI liquido: '+aiRoi+'%',M,y);
      y+=8;

      // Comparáveis
      if(aiComps.length){
        checkPage(40);
        doc.setFont('helvetica','bold');doc.setFontSize(9);doc.setTextColor(...DK);
        doc.text('Comparaveis encontrados no Idealista.pt',M,y);y+=3;
        doc.autoTable({
          startY:y,
          head:[['No','Area','Preco','Euro/m2']],
          body:aiComps.slice(0,6).map((c,i)=>[
            String(i+1)+'.',
            ((c.a||c.area||0))+'m2',
            eur(c.p||c.price||0),
            eur(c.pm||c.pricePerM2||(c.p&&c.a?Math.round(c.p/c.a):0)||0),
          ]),
          theme:'grid',
          styles:{fontSize:8,cellPadding:2,font:'helvetica',textColor:BK},
          headStyles:{fillColor:DK,textColor:WH,fontStyle:'bold',fontSize:8},
          alternateRowStyles:{fillColor:LG},
          columnStyles:{
            0:{cellWidth:10},
            2:{halign:'right',fontStyle:'bold'},
            3:{halign:'right',textColor:AM[0]+','+AM[1]+','+AM[2]},
          },
          margin:{left:M,right:M},
        });
        y=doc.lastAutoTable.finalY+8;
      }

      // Riscos e Oportunidades
      const validRisks=aiRisks.filter(Boolean);
      const validOps=aiOps.filter(Boolean);
      if(validRisks.length||validOps.length){
        checkPage(40);
        const hw=(W-M*2-6)/2;
        // Riscos
        if(validRisks.length){
          doc.setFont('helvetica','bold');doc.setFontSize(8.5);doc.setTextColor(...RD);
          doc.text('RISCOS',M,y);
          doc.setFont('helvetica','normal');doc.setTextColor(...BK);
          let ry=y+4;
          validRisks.forEach(r=>{
            const lines=doc.splitTextToSize('• '+r,hw);
            doc.setFontSize(8);doc.text(lines,M,ry);ry+=lines.length*4.5+2;
          });
        }
        // Oportunidades
        if(validOps.length){
          doc.setFont('helvetica','bold');doc.setFontSize(8.5);doc.setTextColor(...GR);
          doc.text('OPORTUNIDADES',M+hw+6,y);
          doc.setFont('helvetica','normal');doc.setTextColor(...BK);
          let oy=y+4;
          validOps.forEach(o=>{
            const lines=doc.splitTextToSize('• '+o,hw);
            doc.setFontSize(8);doc.text(lines,M+hw+6,oy);oy+=lines.length*4.5+2;
          });
        }
        y+=Math.max(validRisks.length,validOps.length)*14+8;
      }

      // Resumo Executivo
      if(aiSummary){
        checkPage(40);
        // Banner escuro
        doc.setFillColor(...DK);doc.rect(M,y,W-M*2,9,'F');
        doc.setFont('helvetica','bold');doc.setFontSize(9);doc.setTextColor(...WH);
        doc.text('RESUMO EXECUTIVO PARA INVESTIDORES',M+3,y+6);y+=13;

        doc.setFont('helvetica','normal');doc.setFontSize(9);doc.setTextColor(...BK);
        const sumLines=doc.splitTextToSize(aiSummary,W-M*2-4);
        sumLines.forEach(line=>{
          if(y>H-22){addFooterPage(doc,W,H,M);doc.addPage();y=20;}
          doc.text(line,M+2,y);y+=5;
        });
        y+=6;
      }
    }

    // ── AVISO LEGAL ───────────────────────────────────────────
    checkPage(20);
    doc.setFillColor(...LG);doc.rect(M,y,W-M*2,16,'F');
    doc.setFont('helvetica','normal');doc.setFontSize(6.5);doc.setTextColor(...GY);
    const disc=doc.splitTextToSize(
      'AVISO LEGAL: Este relatorio tem caracter informativo e nao constitui aconselhamento financeiro, fiscal ou juridico. '+
      'Os valores apresentados sao estimativas baseadas nos dados inseridos pelo utilizador. '+
      'As obrigacoes fiscais devem ser confirmadas com contabilista ou advogado fiscal certificado. '+
      'Investir em imoveis implica riscos de perda de capital. PropInvest Pro - Tessa Advisors.',
      W-M*2-6
    );
    doc.text(disc,M+3,y+5);y+=18;

    // ── FOOTERS EM TODAS AS PAGINAS ───────────────────────────
    const totalPages=doc.internal.getNumberOfPages();
    for(let pg=1;pg<=totalPages;pg++){
      addFooterPage(doc,W,H,M,pg,totalPages,typeof LOGO!=='undefined'?LOGO:null);
    }

    // Guardar
    const fname='TessaAdvisors_'+
      (p.name||'Projeto').replace(/[^a-zA-Z0-9\u00C0-\u017E]/g,'_').substring(0,30)+
      '_'+new Date().toISOString().slice(0,10)+'.pdf';
    doc.save(fname);
    showToast('PDF gerado com sucesso!');
    document.getElementById('aiMod')?.remove();

  }catch(err){
    console.error('PDF error:',err);
    showToast('Erro PDF: '+err.message);
  }
}



async function shareProject(p,a){
  if(!p||!a)return showToast('Sem dados');
  if(!DB||!CURRENT_USER)return showToast('Necessário login');
  showToast('A gerar relatório...');
  try{
    const sid='ti'+Date.now().toString(36)+Math.random().toString(36).substr(2,6);
    const aiR=Object.values(_aiCache)[0]||null;
    await DB.collection('shared_reports').doc(sid).set({
      html:buildShareHtml(p,a,aiR,sid),
      projectName:p.name||'Projeto',
      createdBy:CURRENT_USER.email,
      createdAt:firebase.firestore.FieldValue.serverTimestamp(),
      expiresAt:new Date(Date.now()+30*24*60*60*1000)
    });
    const link=location.origin+location.pathname+'?share='+sid;
    window._sl=link;
    const ov=document.createElement('div');ov.className='ai-modal-overlay';ov.id='shMod';
    ov.innerHTML=`<div class="ai-modal" style="max-height:55dvh"><div class="ai-modal-header"><div class="ai-modal-title">🔗 Relatório Partilhado</div><button class="btn btn-ghost btn-sm" onclick="document.getElementById('shMod').remove()" style="font-size:18px;padding:4px 8px">✕</button></div><div class="ai-modal-body"><div style="font-size:13px;color:var(--text2);margin-bottom:14px">Relatório de <strong style="color:var(--text)">${esc(p.name||'Projeto')}</strong> pronto. Válido 30 dias.</div><div class="ai-share-link" style="cursor:pointer;word-break:break-all" onclick="navigator.clipboard.writeText(window._sl).then(()=>showToast('Copiado!'))">${esc(link)}</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px"><button class="btn btn-ghost btn-sm" onclick="navigator.clipboard.writeText(window._sl).then(()=>showToast('✅ Copiado!'))" style="justify-content:center">📋 Copiar</button><button class="btn btn-primary btn-sm" onclick="window.open(window._sl,'_blank')" style="justify-content:center">👁️ Ver</button></div></div></div>`;
    document.body.appendChild(ov);ov.addEventListener('click',e=>{if(e.target===ov)ov.remove();});
  }catch(e){showToast('Erro: '+e.message);}
}

<div class="h"><div class="hn">PropInvest Pro · Tessa Advisors <span style="background:rgba(245,158,11,.15);border:1px solid rgba(245,158,11,.3);color:#f59e0b;font-size:8px;font-weight:700;padding:2px 8px;border-radius:999px;text-transform:uppercase;margin-left:8px">Partilhado</span></div><div class="ht">${esc(p.name||'Projeto')}</div><div class="hm">${p.city?`<span class="tg">📍 ${esc(p.city)}${p.parish?', '+esc(p.parish):''}</span>`:''} ${p.typology?`<span class="tg">${esc(p.typology)}</span>`:''} ${p.areaM2?`<span class="tg">${p.areaM2}m²</span>`:''} <span class="tg">${esc(p.strategy)}</span>${p.targetExitDate?`<span class="tg">🎯 ${p.targetExitDate}</span>`:''}</div><div class="hd">Gerado em ${dt} · ID ${sid} · Válido 30 dias</div></div>
<div class="kg"><div class="kp"><div class="kl">Aquisicao All-In</div><div class="kv" style="color:#f59e0b">${eur(a.acqAll)}</div>${p.areaM2?`<div class="ks">${eur(Math.round(a.acqAll/p.areaM2))}/m²</div>`:''}</div><div class="kp"><div class="kl">Capital Investido</div><div class="kv" style="color:#3b82f6">${eur(a.capTotal)}</div><div class="ks">${a.invRes.length} invest.</div></div><div class="kp"><div class="kl">Lucro Liquido</div><div class="kv" style="color:${pC}">${eur(a.netProfit||0)}</div><div class="ks">ROI ${pct(roi)}</div></div><div class="kp"><div class="kl">ROI Liquido</div><div class="kv" style="color:${rC}">${pct(roi)}</div><div class="ks">Pos-imposto</div></div></div>
<div class="sc"><div class="st">💧 Waterfall</div><div class="wr"><span class="wl">Venda ref.</span><span class="wv" style="color:#10b981">${eur(a.saleRef)}</span></div><div class="wr"><span class="wl">Comissao+custos</span><span class="wv" style="color:#ef4444">−${eur(a.ami+(a.saleOth||0))}</span></div><div class="wr"><span class="wl">Capital reembolsar</span><span class="wv" style="color:#ef4444">−${eur(a.capTotal)}</span></div><div class="wr"><span class="wl">Imposto</span><span class="wv" style="color:#ef4444">−${eur(a.taxTotal)}</span></div><div class="wr hl"><span class="wl" style="font-weight:700;color:#f1f5f9">Lucro Liquido</span><span class="wv" style="color:${pC};font-size:13px">${eur(a.netProfit||0)}</span></div></div>
<div class="sc"><div class="st">📊 Estrutura Custos</div>${bars.map(([l,v,c])=>{const pv=tot>0?Math.round(v/tot*100):0;return`<div class="br"><div class="bl">${l}</div><div class="bt"><div class="bf" style="width:${pv}%;background:${c}"></div></div><div class="bv" style="color:${c}">${eur(v)}</div></div>`;}).join('')}</div>
<div class="sc"><div class="st">📑 Fiscal IRS Cat. G</div><div class="mr"><span class="mk">Lucro bruto</span><span class="mv">${eur(a.profit)}</span></div><div class="mr"><span class="mk">Base tributavel (50%)</span><span class="mv">${eur(a.taxableGain)}</span></div><div class="mr"><span class="mk">Taxa efectiva</span><span class="mv">14%</span></div><div class="mr"><span class="mk">Imposto</span><span class="mv" style="color:#ef4444">−${eur(a.taxTotal)}</span></div><div class="mr"><span class="mk" style="font-weight:700;color:#f1f5f9">Lucro liquido</span><span class="mv" style="color:${pC};font-size:13px">${eur(a.netProfit||0)}</span></div></div>
${ai&&ai.comps&&ai.comps.length?`<div class="sc"><div class="st">🏘️ Comparaveis — Idealista.pt</div>${ai.comps.slice(0,5).map(c=>`<div class="cc"><div class="ci"><div class="ct">${esc(c.d||c.title||'—')}</div><div class="cm">${(c.a||c.area)||'—'}m²</div></div><div><div class="cv">${eur(c.p||c.price||0)}</div><div class="cs">${eur(c.pm||c.pricePerM2||0)}/m²</div></div></div>`).join('')}</div>`:``}
${ai&&(ai.summary||ai.res)?`<div class="ai"><div class="ait">🤖 Análise IA · Pesquisa Idealista.pt</div><div class="aix">${esc(ai.summary||ai.res||'')}</div></div>`:''}
<div class="ft"><div class="fb">PropInvest Pro · Tessa Advisors</div><div>Gerado em ${dt}</div><div class="dc">Aviso Legal: Relatorio informativo. Nao constitui aconselhamento financeiro ou juridico. Confirmar obrigacoes fiscais com profissional.</div></div>
</div></body></html>`;
}

function checkShareLink(){
  const sid=new URLSearchParams(location.search).get('share');
  if(!sid)return;
  if(!DB){setTimeout(checkShareLink,800);return;}
  document.body.innerHTML='<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:#09090f;color:#94a3b8;font-size:13px">A carregar...</div>';
  DB.collection('shared_reports').doc(sid).get().then(doc=>{
    if(!doc.exists){document.body.innerHTML='<div style="text-align:center;padding:60px;background:#09090f;min-height:100vh;color:#94a3b8"><div style="font-size:40px;margin-bottom:12px">🔗</div><div style="color:#f1f5f9;font-size:16px;font-weight:700">Link inválido ou expirado</div></div>';return;}
    document.open();document.write(doc.data().html);document.close();
  }).catch(e=>{document.body.innerHTML='<div style="padding:40px;color:#ef4444;text-align:center">Erro: '+e.message+'</div>';});
}
