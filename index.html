// ── Motor de Análise ───────────────────────────────────────────
async function runAIAnalysis(p,a,ck){
  showAILoading();
  try{
    const k=getApiKey();
    // Contexto do imóvel
    const loc=(p.parish?p.parish+', ':'')+( p.city||'Lisboa');
    const typo=p.typology||'apartamento';
    const area=Number(p.areaM2||0);
    const saleExp=Number(p.expectedSalePrice||0);
    const mc=p.marketConfig||{};
    const extras=[];
    if(mc.hasPool)extras.push('piscina');
    if(mc.hasGarage)extras.push('garagem');
    if(mc.hasGarden)extras.push('jardim');
    if(mc.hasTerrace)extras.push('terraco');
    if(mc.hasElevator)extras.push('elevador');
    const cond={muito_fraco:'degradado',fraco:'usado',medio:'bom estado',bom:'renovado',premium:'novo/luxo'}[mc.conditionLevel]||'bom estado';

    const totalInv=a?(a.acqAll+a.wrkTotal+(a.holdingTotal||0)):Number(p.purchasePrice||0);
    const lucro=a?(a.netProfit||0):0;
    const roi=a?Math.round(a.roiNet||0):0;

    // CHAMADA 1 — Pesquisa Idealista + JSON numérico puro (tokens mínimos)
    const prompt1=`Pesquisa Idealista.pt: ${typo} ${area?area+'m2 ':''} ${loc}${extras.length?' com '+extras.join(' '):''}${cond?' estado '+cond:''}.
Preco pedido pelo investidor: ${saleExp?saleExp+'eur':'nao definido'}.
Responde so com JSON real (sem zeros):
{"med":0,"psm":0,"vmin":0,"vmax":0,"n":0,"pos":0,"ok":2,"cf":2,"c":[{"p":0,"a":0},{"p":0,"a":0},{"p":0,"a":0}]}
med=mediana mercado eur, psm=eur/m2 zona, vmin/vmax=intervalo preco realista, n=nr anuncios, pos=-2a2(posicionamento preco pedido vs mercado), ok=1-4(negocio), cf=1-3(confianca), c=3 comparaveis reais(p=preco,a=area m2). JSON ONLY.`;

    const r1=await aiCall(k,'claude-haiku-4-5-20251001',200,
      'Real estate expert Portugal. Search Idealista.pt. Return ONLY JSON.',
      [{role:'user',content:prompt1}],true);

    const t1=(r1.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('').trim();
    if(!t1)throw new Error('Sem resposta da API. Verifica créditos em console.anthropic.com');

    // Parse JSON robusto
    let d={med:0,psm:0,vmin:0,vmax:0,n:0,pos:0,ok:2,cf:2,c:[]};
    try{
      const s=t1.replace(/```[a-z]*/gi,'').replace(/```/g,'').trim();
      let depth=0,si=-1,ei=-1;
      for(let i=0;i<s.length;i++){
        if(s[i]==='{'){if(si<0)si=i;depth++;}
        else if(s[i]==='}'){depth--;if(d===0&&si>=0){ei=i;break;}}
      }
      // fix: use depth not d
      let dp=0,si2=-1,ei2=-1;
      for(let i=0;i<s.length;i++){
        if(s[i]==='{'){if(si2<0)si2=i;dp++;}
        else if(s[i]==='}'){dp--;if(dp===0&&si2>=0){ei2=i;break;}}
      }
      if(si2>=0&&ei2>si2){
        const parsed=JSON.parse(s.slice(si2,ei2+1));
        if(parsed.med>0||parsed.psm>0)d=parsed;
      }
    }catch(e){
      const nx=(key,fb)=>{const m=t1.match(new RegExp('"'+key+'"\\s*:\\s*(-?[\\d.]+)'));return m?Number(m[1]):fb;};
      d.med=nx('med',0);d.psm=nx('psm',0);d.vmin=nx('vmin',0);d.vmax=nx('vmax',0);
      d.n=nx('n',0);d.pos=nx('pos',0);d.ok=nx('ok',2);d.cf=nx('cf',2);
    }

    d.ok=Math.min(4,Math.max(1,Math.round(d.ok)||2));
    d.cf=Math.min(3,Math.max(1,Math.round(d.cf)||2));
    d.pos=Math.min(2,Math.max(-2,Math.round(d.pos)||0));
    const comps=(d.c||[]).filter(x=>x.p>0);

    // CHAMADA 2 — Texto profissional (sem web search, barato)
    const diffPct=d.med>0&&saleExp>0?((saleExp-d.med)/d.med*100).toFixed(1):'—';
    const posLabel={'-2':'muito abaixo','-1':'abaixo do','0':'dentro do','1':'acima do','2':'muito acima'}[String(d.pos)]||'—';
    const okLabel={1:'excelente',2:'bom',3:'razoavel',4:'fraco'}[d.ok]||'razoavel';

    const prompt2=`Imovel: ${typo} ${area?area+'m2':''} ${loc}, estado ${cond}${extras.length?', '+extras.join(', '):''}
Preco pedido: ${saleExp?saleExp+'eur':'nao definido'}${saleExp&&area?' ('+Math.round(saleExp/area)+'eur/m2)':''}
Mediana mercado Idealista ${loc}: ${d.med?d.med+'eur ('+d.psm+'eur/m2)':'—'} | ${d.n||0} anuncios
Intervalo mercado: ${d.vmin?d.vmin+'eur':'—'} a ${d.vmax?d.vmax+'eur':'—'}
Posicionamento preco: ${posLabel} mercado (${diffPct}%)
Capital investido: ${totalInv}eur | Lucro liquido: ${lucro}eur | ROI: ${roi}% | Negocio: ${okLabel}

Responde em portugues profissional imobiliario, sem markdown, sem bullets:
POSICIONAMENTO: (1 frase tecnica sobre o preco pedido vs mercado usando terminologia financeira imobiliaria)
RISCOS: risco1 / risco2
OPORTUNIDADES: op1 / op2
RESUMO: (2 paragrafos executivos com dados concretos para apresentar a investidores)`;

    const r2=await aiCall(k,'claude-haiku-4-5-20251001',300,
      'Especialista senior investimento imobiliario Portugal. Portugues. Terminologia financeira.',
      [{role:'user',content:prompt2}],false);

    const txt=(r2.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('').trim()||'';
    const sec=lbl=>{
      const m=txt.match(new RegExp(lbl+'[:\\s]+([\\s\\S]*?)(?=POSICIONAMENTO:|RISCOS:|OPORTUNIDADES:|RESUMO:|$)','i'));
      return m?m[1].trim():'';
    };

    const result={
      med:d.med, psm:d.psm, vmin:d.vmin, vmax:d.vmax, n:d.n,
      pos:d.pos, ok:d.ok, cf:d.cf, comps,
      posText:sec('POSICIONAMENTO'),
      ris:sec('RISCOS').split(/[\/\n]/).map(s=>s.replace(/^[-•*\d.]+\s*/,'')).filter(s=>s.length>4).slice(0,3),
      ops:sec('OPORTUNIDADES').split(/[\/\n]/).map(s=>s.replace(/^[-•*\d.]+\s*/,'')).filter(s=>s.length>4).slice(0,3),
      res:sec('RESUMO')||(txt.length>30?txt:'Análise concluída.'),
      loc, typo, area, saleExp,
      salePerM2:area>0&&saleExp>0?Math.round(saleExp/area):0,
      totalInv, lucro, roi, diffPct:Number(diffPct)||0,
      analyzedAt:new Date().toLocaleString('pt-PT'),
    };

    // Persiste
    window._aiResult=result;
    _aiCache[ck]=result;
    try{localStorage.setItem('ai_'+p.id,JSON.stringify(result));}catch(e){}
    const proj=AP();if(proj){proj.aiSummary=result.res;setP(proj);}
    showAIModal(result,p,a,ck,false);

  }catch(err){
    const body=document.getElementById('aiBody');
    if(!body)return;
    body.innerHTML=`<div style="text-align:center;padding:40px 20px">
      <div style="font-size:44px;margin-bottom:14px">⚠️</div>
      <div style="font-family:'Syne',sans-serif;font-weight:700;font-size:16px;margin-bottom:10px">Erro na análise</div>
      <div style="background:var(--surface);padding:14px;border-radius:10px;font-size:12px;color:var(--text2);margin-bottom:18px;line-height:1.6">${esc(err.message)}</div>
      <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap">
        <button class="btn btn-primary" onclick="document.getElementById('aiMod')?.remove();openAIModal(AP(),analyze(AP()))">🔄 Tentar novamente</button>
        <button class="btn btn-ghost btn-sm" onclick="document.getElementById('aiMod')?.remove();openApiKeySetup()">🔑 API Key</button>
      </div>
    </div>`;
  }
}

// ── Alertas Inteligentes ───────────────────────────────────────
function computeSmartAlerts(p,a){
  if(!p||!a)return[];
  const al=[],today=new Date();
  if(a.roi>0&&a.roi<10)al.push({type:'danger',icon:'🚨',msg:`ROI bruto ${pct(a.roi)} abaixo de 10%.`});
  else if(a.roi>=10&&a.roi<15)al.push({type:'warning',icon:'⚠️',msg:`ROI bruto ${pct(a.roi)} abaixo do benchmark PT (15%).`});
  if(p.purchasePrice>0&&a.wrkTotal>0){const r=a.wrkTotal/p.purchasePrice*100;if(r>50)al.push({type:'danger',icon:'🔨',msg:`Obras ${r.toFixed(0)}% do preço — risco elevado.`});else if(r>35)al.push({type:'warning',icon:'🔨',msg:`Obras ${r.toFixed(0)}% do preço — acima do recomendado.`});}
  if(p.targetExitDate){const d=Math.round((new Date(p.targetExitDate)-today)/864e5);if(d<0)al.push({type:'danger',icon:'📅',msg:`Saída ultrapassada há ${Math.abs(d)} dias.`});else if(d<30)al.push({type:'warning',icon:'📅',msg:`Saída em ${d} dias.`});}
  if(!p.expectedSalePrice)al.push({type:'warning',icon:'💡',msg:'Preço de venda esperado não definido.'});
  if(a.invRes?.length&&Math.abs(a.splitSum-100)>0.5)al.push({type:'danger',icon:'👥',msg:`Split soma ${pct(a.splitSum)} — deve ser 100%.`});
  return al;
}

// ── Export PDF ─────────────────────────────────────────────────
async function exportAIPDF(p,a,ai){
  if(!p||!a){showToast('Sem dados para exportar');return;}
  showToast('A gerar PDF...');
  try{
    const{jsPDF}=window.jspdf;
    const doc=new jsPDF({orientation:'p',unit:'mm',format:'a4'});
    const W=doc.internal.pageSize.getWidth(),H=doc.internal.pageSize.getHeight(),M=14;
    // Paleta
    const DK=[55,62,67],WH=[255,255,255],BK=[15,23,42];
    const AM=[245,158,11],BL=[59,130,246],GR=[16,185,129],RD=[239,68,68],PU=[139,92,246];
    const GY=[148,163,184],LG=[248,250,252],LGBDR=[220,225,230];
    let y=0;

    const logo=typeof LOGO!=='undefined'?LOGO:null;
    const chkY=(need)=>{if(y+need>H-22){addFooterPage(doc,W,H,M,doc.internal.getNumberOfPages(),null,logo);doc.addPage();addHeaderBrand();y=20;}};
    
    // Header de marca em cada página nova
    function addHeaderBrand(){
      doc.setFillColor(...DK);doc.rect(0,0,W,12,'F');
      // Logo Tessa Advisors no header
      if(logo){
        try{
          const lH=5,lW=lH*(1072/122);
          doc.addImage(logo,'PNG',(W-lW)/2,3.5,lW,lH);
        }catch(e){
          doc.setFont('helvetica','bold');doc.setFontSize(7);doc.setTextColor(...WH);
          doc.text('TESSA ADVISORS',W/2,8,{align:'center'});
        }
      } else {
        doc.setFont('helvetica','bold');doc.setFontSize(7);doc.setTextColor(...WH);
        doc.text('TESSA ADVISORS',W/2,8,{align:'center'});
      }
    }

    // ── CAPA ─────────────────────────────────────────────────────
    // Fundo branco/claro para capa
    doc.setFillColor(250,250,252);doc.rect(0,0,W,H,'F');
    // Logo Tessa Advisors -- banda escura no topo da capa
    doc.setFillColor(55,62,67);doc.rect(0,0,W,28,'F');
    if(logo){
      try{
        const lH=12,lW=lH*(1072/122);
        doc.addImage(logo,'PNG',(W-lW)/2,8,lW,lH);
      }catch(e){
        doc.setFont('helvetica','bold');doc.setFontSize(12);doc.setTextColor(255,255,255);
        doc.text('TESSA ADVISORS',W/2,18,{align:'center'});
      }
    } else {
      doc.setFont('helvetica','bold');doc.setFontSize(12);doc.setTextColor(255,255,255);
      doc.text('TESSA ADVISORS',W/2,18,{align:'center'});
    }
    // Linha divisora (abaixo da banda do logo)
    doc.setFillColor(245,158,11);doc.rect(0,27,W,3,'F');
    doc.setDrawColor(220,225,230);doc.setLineWidth(0.4);doc.line(M,38,W-M,38);
    // Etiqueta
    doc.setFont('helvetica','normal');doc.setFontSize(7.5);doc.setTextColor(...GY);
    doc.text('RELATORIO CONFIDENCIAL DE INVESTIMENTO IMOBILIARIO',W/2,46,{align:'center'});
    doc.setFontSize(7);
    doc.text(new Date().toLocaleDateString('pt-PT',{day:'2-digit',month:'long',year:'numeric'}),W/2,51,{align:'center'});
    // Bloco projecto com fundo neutro
    doc.setFillColor(240,241,245);doc.rect(M,60,W-M*2,40,'F');
    doc.setFillColor(...AM);doc.rect(M,60,3,40,'F');
    doc.setFont('helvetica','bold');doc.setFontSize(7);doc.setTextColor(...GY);
    doc.text('PROJECTO DE INVESTIMENTO',M+6,68);
    const nameLines=doc.splitTextToSize(p.name||'Projecto',W-M*2-12);
    doc.setFontSize(18);doc.setFont('helvetica','bold');doc.setTextColor(...BK);
    doc.text(nameLines,M+6,78);

    y=112;
    // Meta dados
    const meta=[p.city&&p.parish?p.city+', '+p.parish:p.city||'',p.typology||'',p.areaM2?p.areaM2+'m2':'',p.strategy].filter(Boolean);
    doc.setFont('helvetica','normal');doc.setFontSize(9);doc.setTextColor(...GY);
    doc.text(meta.join('  .  '),M,y);y+=5;
    doc.setFontSize(8);
    doc.text('Preparado por Tessa Advisors . PropInvest Pro . '+new Date().toLocaleDateString('pt-PT'),M,y);y+=8;
    doc.setDrawColor(...AM);doc.setLineWidth(0.5);doc.line(M,y,W-M,y);y+=10;

    // ── BANNER AI (posicionamento mercado) ───────────────────────
    if(ai){
      const posCols={'-2':BL,'-1':BL,'0':GR,'1':AM,'2':RD};
      const posLbls={'-2':'MUITO ABAIXO DO MERCADO','-1':'ABAIXO DO MERCADO','0':'DENTRO DO MERCADO','1':'ACIMA DO MERCADO','2':'MUITO ACIMA DO MERCADO'};
      const okLbls={1:'EXCELENTE NEGÓCIO',2:'BOM NEGÓCIO',3:'NEGÓCIO RAZOÁVEL',4:'NEGÓCIO FRACO'};
      const posC=posCols[String(ai.pos)]||AM;
      const okC={1:GR,2:GR,3:AM,4:RD}[ai.ok]||AM;

      // Bloco posicionamento
      doc.setFillColor(...posC);doc.rect(M,y,W/2-M-3,20,'F');
      doc.setFont('helvetica','bold');doc.setFontSize(7);doc.setTextColor(...WH);
      doc.text('POSICIONAMENTO DO PREÇO',M+3,y+5);
      doc.setFontSize(9);doc.text(posLbls[String(ai.pos)]||'—',M+3,y+12);
      const dif=Number(ai.diffPct||0);
      doc.setFontSize(7);doc.setFont('helvetica','normal');
      doc.text((dif>0?'+':'')+dif.toFixed(1)+'% vs mediana mercado',M+3,y+17);

      // Bloco avaliação
      doc.setFillColor(...okC);doc.rect(W/2+3,y,W/2-M-3,20,'F');
      doc.setFont('helvetica','bold');doc.setFontSize(7);doc.setTextColor(...WH);
      doc.text('AVALIAÇÃO DO NEGÓCIO',W/2+6,y+5);
      doc.setFontSize(9);doc.text(okLbls[ai.ok]||'—',W/2+6,y+12);
      doc.setFontSize(7);doc.setFont('helvetica','normal');
      doc.text('ROI líquido: '+String(ai.roi||0)+'% · Confiança: '+({1:'Alta',2:'Média',3:'Baixa'}[ai.cf]||'—'),W/2+6,y+17);
      y+=26;
    }

    // ── KPIs FINANCEIROS (4 boxes) ────────────────────────────────
    const roi=a.roiNet||0;
    const kpis=[
      {l:'Aquisição All-In',v:eur(a.acqAll),s:p.areaM2?eur(Math.round(a.acqAll/p.areaM2))+'/m²':'',c:AM},
      {l:'Capital Investido',v:eur(a.capTotal),s:(a.invRes?.length||0)+' investidor(es)',c:BL},
      {l:'Lucro Líquido',v:eur(a.netProfit||0),s:'ROI '+pct(roi),c:(a.netProfit||0)>=0?GR:RD},
      {l:'ROI Líquido',v:pct(roi),s:'Pós-imposto IRS',c:roi>=20?GR:roi>=10?AM:RD},
    ];
    const kW=(W-M*2-9)/2,kH=22;
    kpis.forEach((k,i)=>{
      const kx=M+(i%2)*(kW+9),ky=y+Math.floor(i/2)*(kH+5);
      doc.setFillColor(...LG);doc.rect(kx,ky,kW,kH,'F');
      doc.setFillColor(...k.c);doc.rect(kx,ky,2.5,kH,'F');
      doc.setFont('helvetica','normal');doc.setFontSize(7);doc.setTextColor(...GY);
      doc.text(k.l.toUpperCase(),kx+5,ky+6);
      doc.setFont('helvetica','bold');doc.setFontSize(12);doc.setTextColor(...BK);
      doc.text(k.v,kx+5,ky+15);
      if(k.s){doc.setFontSize(6.5);doc.setFont('helvetica','normal');doc.setTextColor(...GY);doc.text(k.s,kx+5,ky+20);}
    });
    y+=kH*2+5+8;

    // ── MÉTRICAS AVANÇADAS DE INVESTIMENTO ──────────────────────
    chkY(55);
    doc.setFillColor(...DK);doc.rect(M,y,W-M*2,8,'F');
    doc.setFont('helvetica','bold');doc.setFontSize(8);doc.setTextColor(...WH);
    doc.text('MÉTRICAS DE AVALIAÇÃO — PADRÕES INTERNACIONAIS DE INVESTIMENTO IMOBILIÁRIO',M+3,y+5);
    y+=11;

    const equityInv=a.equityInvested||a.capTotal||1;
    const equityMult=a.netFinal>0?(a.netFinal/equityInv):0;
    const margemLiq=a.saleRef>0?((a.netProfit||0)/a.saleRef*100):0;
    const costRatio=a.saleRef>0?(a.capTotal/a.saleRef*100):0;
    const spread=ai&&ai.psm&&p.areaM2>0&&a.saleRef>0?((a.saleRef/p.areaM2)-ai.psm):0;

    const metrics=[
      ['ROI Líquido (pós-imposto)','Return on Investment',pct(a.roiNet||0),'Benchmark PT Flip: 15-25%',a.roiNet>=20?GR:a.roiNet>=12?AM:RD],
      ['Equity Multiple','EM — Multiplicador do Capital',equityMult>0?equityMult.toFixed(2)+'x':'—','Target >1.2x (conservador)',equityMult>=1.3?GR:equityMult>=1.1?AM:RD],
      ['Margem Líquida','Net Profit Margin',margemLiq>0?margemLiq.toFixed(1)+'%':'—','Target >12% sobre venda',margemLiq>=15?GR:margemLiq>=8?AM:RD],
      ['Cost-to-Value Ratio','CVR — Eficiência do capital',costRatio>0?costRatio.toFixed(1)+'%':'—','< 75% é saudável',costRatio<=70?GR:costRatio<=80?AM:RD],
      ['Spread vs Mercado','Diferencial de valorização',spread!==0?(spread>0?'+':'')+eur(spread)+'/m²':'—',ai&&ai.psm?'Mercado: '+eur(ai.psm)+'/m²':'-',spread>200?GR:spread>0?AM:RD],
      ['Prazo de Saída','Holding period',p.targetExitDate?p.targetExitDate:'—',a.holdMonths?a.holdMonths+' meses de holding':'-',[148,163,184]],
    ];

    metrics.forEach(([title,sub,val,bench,col],i)=>{
      const ry=y+(i*11);
      if(i%2===0){doc.setFillColor(...LG);doc.rect(M,ry-2,W-M*2,10,'F');}
      doc.setFont('helvetica','bold');doc.setFontSize(8);doc.setTextColor(...BK);
      doc.text(title,M+3,ry+3);
      doc.setFont('helvetica','normal');doc.setFontSize(7);doc.setTextColor(...GY);
      doc.text(sub,M+3,ry+8);
      doc.setFont('helvetica','bold');doc.setFontSize(9);doc.setTextColor(...col);
      doc.text(val,W-M-3,ry+3,{align:'right'});
      doc.setFont('helvetica','normal');doc.setFontSize(7);doc.setTextColor(...GY);
      doc.text(bench,W-M-3,ry+8,{align:'right'});
    });
    y+=metrics.length*11+8;

    // ── WATERFALL ────────────────────────────────────────────────
    chkY(72);
    doc.setFillColor(...DK);doc.rect(M,y,W-M*2,8,'F');
    doc.setFont('helvetica','bold');doc.setFontSize(8);doc.setTextColor(...WH);
    doc.text('WATERFALL FINANCEIRO',M+3,y+5);y+=11;
    const wf=[
      ['Valor de venda (referência)',eur(a.saleRef||0),true,false],
      ['(-) Comissão mediação + custos venda','-'+eur((a.ami||0)+(a.saleOth||0)),false,false],
      ['(=) Receita líquida de venda',eur(a.saleNet||0),true,false],
      ['(-) Reembolso de capital','-'+eur(a.capTotal||0),false,false],
      ['(=) Lucro bruto (EBITDA)',eur(a.profit||0),(a.profit||0)>=0,false],
      ['(-) Imposto mais-valias IRS (50%×28%)','-'+eur(a.taxTotal||0),false,false],
      ['(=) LUCRO LÍQUIDO PÓS-IMPOSTO',eur(a.netProfit||0),(a.netProfit||0)>=0,true],
    ];
    wf.forEach(([l,v,pos,hi],i)=>{
      const ry=y;
      if(hi){doc.setFillColor(...GR);doc.rect(M,ry-3,W-M*2,10,'F');doc.setTextColor(...WH);}
      else if(i%2===0){doc.setFillColor(...LG);doc.rect(M,ry-3,W-M*2,9,'F');doc.setTextColor(...GY);}
      else doc.setTextColor(...GY);
      doc.setFont('helvetica',hi?'bold':'normal');doc.setFontSize(hi?9:8.5);
      if(!hi)doc.setTextColor(...GY);
      doc.text(l,M+3,ry+2);
      doc.setTextColor(...(hi?WH:(pos?GR:RD)));doc.text(v,W-M-3,ry+2,{align:'right'});
      y+=hi?10:9;
    });y+=8;

    // ── DECOMPOSIÇÃO DO INVESTIMENTO ─────────────────────────────
    chkY(55);
    doc.setFillColor(...DK);doc.rect(M,y,W-M*2,8,'F');
    doc.setFont('helvetica','bold');doc.setFontSize(8);doc.setTextColor(...WH);
    doc.text('DECOMPOSIÇÃO DO CAPITAL INVESTIDO',M+3,y+5);y+=11;

    const invRows=[
      ['Preço de aquisição',eur(p.purchasePrice||0),''],
      ['Custos de aquisição (IMT, IS, registos)',eur(a.lg?a.lg.imt+a.lg.is+a.lg.reg+a.lg.cert:0),''],
      ['Obras e reabilitação',eur(a.wrkTotal||0),''],
      ['Custos de financiamento',eur(a.financingInterestHolding||0),''],
      ['Holding / Manutenção',eur(a.holdingTotal||0),''],
      ['TOTAL CAPITAL INVESTIDO',eur(a.capTotal||0),'bold'],
    ];
    const totInv=a.capTotal||1;
    invRows.forEach(([l,v,weight],i)=>{
      const hi=weight==='bold';
      if(hi){doc.setFillColor(...DK);doc.rect(M,y-3,W-M*2,9,'F');doc.setTextColor(...WH);}
      else{if(i%2===0){doc.setFillColor(...LG);doc.rect(M,y-3,W-M*2,8,'F');}doc.setTextColor(...GY);}
      doc.setFont('helvetica',hi?'bold':'normal');doc.setFontSize(hi?9:8.5);
      doc.text(l,M+3,y+2);
      if(!hi)doc.setTextColor(...AM);
      doc.text(v,W-M-3,y+2,{align:'right'});
      y+=hi?10:8;
    });y+=8;

    // ── BARRAS ESTRUTURA DE CUSTOS ────────────────────────────────
    chkY(40);
    doc.setFillColor(...DK);doc.rect(M,y,W-M*2,8,'F');
    doc.setFont('helvetica','bold');doc.setFontSize(8);doc.setTextColor(...WH);
    doc.text('ESTRUTURA DE CUSTOS',M+3,y+5);y+=11;
    const costBars=[
      ['Aquisição',a.acqAll||0,AM],['Obras',a.wrkTotal||0,BL],
      ['Venda/Comissões',(a.ami||0)+(a.saleOth||0),RD],['Imposto',a.taxTotal||0,PU]
    ];
    const totCosts=costBars.reduce((s,c)=>s+(c[1]||0),0)||1;
    const bW=W-M*2-50;
    costBars.forEach(([l,v,c])=>{
      const pv=Math.min(1,v/totCosts);
      doc.setFont('helvetica','normal');doc.setFontSize(8);doc.setTextColor(...GY);doc.text(l,M,y+3);
      doc.setFillColor(...LGBDR);doc.rect(M+34,y-1,bW,6,'F');
      if(pv>0){doc.setFillColor(...c);doc.rect(M+34,y-1,bW*pv,6,'F');}
      doc.setFont('helvetica','bold');doc.setTextColor(...c);
      doc.text(eur(v)+' ('+Math.round(pv*100)+'%)',W-M,y+3,{align:'right'});
      y+=10;
    });y+=6;

    // ── FISCAL ───────────────────────────────────────────────────
    chkY(50);
    doc.setFillColor(...DK);doc.rect(M,y,W-M*2,8,'F');
    doc.setFont('helvetica','bold');doc.setFontSize(8);doc.setTextColor(...WH);
    doc.text('APURAMENTO FISCAL — IRS Cat. G (Art. 43.º CIRS)',M+3,y+5);y+=5;
    doc.autoTable({
      startY:y,head:[['Rubrica Fiscal','Valor']],
      body:[
        ['Lucro bruto (mais-valia)',eur(a.profit||0)],
        ['Base tributável (inclusão 50%)',eur(a.taxableGain||0)],
        ['Taxa autónoma mais-valias','28%'],
        ['Taxa efectiva real sobre lucro bruto','14% (50%×28%)'],
        ['Imposto mais-valias estimado','-'+eur(a.taxTotal||0)],
        ['Lucro líquido pós-imposto',eur(a.netProfit||0)],
      ],
      theme:'striped',
      styles:{fontSize:8.5,cellPadding:2.5,font:'helvetica',textColor:BK},
      headStyles:{fillColor:DK,textColor:WH,fontStyle:'bold'},
      columnStyles:{1:{halign:'right',fontStyle:'bold'}},
      margin:{left:M,right:M}
    });
    y=doc.lastAutoTable.finalY+10;

    // ── ANÁLISE DE MERCADO (IA) ───────────────────────────────────
    if(ai&&(ai.med>0||ai.saleExp>0)){
      chkY(55);
      doc.setFillColor(...DK);doc.rect(M,y,W-M*2,8,'F');
      doc.setFont('helvetica','bold');doc.setFontSize(8);doc.setTextColor(...WH);
      doc.text('ANÁLISE DE MERCADO — PESQUISA IDEALISTA.PT EM TEMPO REAL',M+3,y+5);y+=11;

      // Caixa de posicionamento
      const posC2={'-2':BL,'-1':BL,'0':GR,'1':AM,'2':RD}[String(ai.pos)]||AM;
      const posT2={'-2':'MUITO ABAIXO DO MERCADO','-1':'ABAIXO DO MERCADO','0':'DENTRO DO MERCADO','1':'ACIMA DO MERCADO','2':'MUITO ACIMA DO MERCADO'}[String(ai.pos)]||'EM ANÁLISE';
      doc.setFillColor(...posC2);doc.rect(M,y,W-M*2,26,'F');
      doc.setFont('helvetica','bold');doc.setFontSize(11);doc.setTextColor(...WH);
      doc.text(posT2,W/2,y+8,{align:'center'});
      doc.setFontSize(8);doc.setFont('helvetica','normal');
      const locStr=String(ai.loc||p.city||'').replace(/[^\w\s,.-]/g,'');
      doc.text('Preço pedido: '+eur(ai.saleExp||0)+(ai.salePerM2?' ('+eur(ai.salePerM2)+'/m²)':'')+'   |   Mediana '+locStr+': '+eur(ai.med||0)+(ai.psm?' ('+eur(ai.psm)+'/m²)':''),W/2,y+16,{align:'center'});
      doc.text('Intervalo: '+eur(ai.vmin||0)+' – '+eur(ai.vmax||0)+(ai.n?' | '+ai.n+' anúncios no Idealista':''),W/2,y+22,{align:'center'});
      y+=32;

      // Texto posicionamento
      if(ai.posText){
        chkY(20);
        doc.setFont('helvetica','italic');doc.setFontSize(8.5);doc.setTextColor(...GY);
        const pl=doc.splitTextToSize(ai.posText,W-M*2-4);doc.text(pl,M,y);y+=pl.length*4.5+6;
      }

      // Comparáveis
      if(ai.comps&&ai.comps.length){
        chkY(35);
        doc.setFont('helvetica','bold');doc.setFontSize(9);doc.setTextColor(...DK);
        doc.text('Imóveis Comparáveis — '+locStr+' · Idealista.pt',M,y);y+=4;
        doc.autoTable({
          startY:y,
          head:[['Comparável','Área','Preço de Venda','€/m²','vs Preço Pedido']],
          body:ai.comps.slice(0,3).map((c,i)=>{
            const cp=c.p||0,ca=c.a||0,cpm=ca>0?Math.round(cp/ca):0;
            const dif=ai.saleExp&&cp?((cp-ai.saleExp)/ai.saleExp*100):0;
            return['Imóvel '+String(i+1)+' — '+String(ai.typo||p.typology||'—'),
              ca>0?ca+'m²':'—',eur(cp),eur(cpm),dif!==0?(dif>0?'+':'')+dif.toFixed(0)+'%':'='];
          }),
          theme:'grid',
          styles:{fontSize:8.5,cellPadding:2.5,font:'helvetica',textColor:BK},
          headStyles:{fillColor:DK,textColor:WH,fontStyle:'bold',fontSize:8},
          alternateRowStyles:{fillColor:LG},
          columnStyles:{2:{halign:'right',fontStyle:'bold'},3:{halign:'right'},4:{halign:'right'}},
          margin:{left:M,right:M}
        });
        y=doc.lastAutoTable.finalY+8;
      }

      // Riscos & Oportunidades
      if(ai.ris?.length||ai.ops?.length){
        chkY(50);
        // Riscos e oportunidades com autoTable - clean, sem sobreposicao
        const roRows=[];
        const maxR=Math.max(ai.ris?.length||0,ai.ops?.length||0);
        for(let i=0;i<maxR;i++){
          roRows.push([
            (ai.ris||[])[i]?'▸ '+((ai.ris||[])[i]):'',
            (ai.ops||[])[i]?'▸ '+((ai.ops||[])[i]):'',
          ]);
        }
        doc.autoTable({
          startY:y,
          head:[[
            {content:'FACTORES DE RISCO',styles:{textColor:RD,fontStyle:'bold',fontSize:8.5}},
            {content:'OPORTUNIDADES DE VALOR',styles:{textColor:GR,fontStyle:'bold',fontSize:8.5}},
          ]],
          body:roRows,
          theme:'grid',
          styles:{fontSize:8.5,cellPadding:4,font:'helvetica',textColor:BK,overflow:'linebreak',minCellHeight:10},
          headStyles:{fillColor:LG,fontStyle:'bold',fontSize:8.5,cellPadding:[3,4]},
          columnStyles:{0:{cellWidth:(W-M*2)/2},1:{cellWidth:(W-M*2)/2}},
          margin:{left:M,right:M},
        });
        y=doc.lastAutoTable.finalY+8;
      }

      // Resumo executivo — peça central
      if(ai.res){
        chkY(40);
        doc.setFillColor(...DK);doc.rect(M,y,W-M*2,9,'F');
        doc.setFont('helvetica','bold');doc.setFontSize(9);doc.setTextColor(...WH);
        doc.text('RESUMO EXECUTIVO PARA INVESTIDORES',M+4,y+6);y+=13;
        doc.setFont('helvetica','normal');doc.setFontSize(9);doc.setTextColor(...BK);
        const sl=doc.splitTextToSize(ai.res,W-M*2-4);
        sl.forEach(l=>{
          if(y>H-22){addFooterPage(doc,W,H,M,doc.internal.getNumberOfPages(),null,logo);doc.addPage();y=20;}
          doc.text(l,M+2,y);y+=5;
        });y+=6;
      }
    }

    // ── DISTRIBUIÇÃO DE INVESTIDORES ─────────────────────────────
    if(a.invRes&&a.invRes.length){
      chkY(40);
      doc.setFillColor(...DK);doc.rect(M,y,W-M*2,8,'F');
      doc.setFont('helvetica','bold');doc.setFontSize(8);doc.setTextColor(...WH);
      doc.text('DISTRIBUIÇÃO POR INVESTIDOR',M+3,y+5);y+=5;
      doc.autoTable({
        startY:y,head:[['Investidor','Capital (€)','Split (%)','Retorno Esperado (€)']],
        body:a.invRes.map(inv=>[inv.name||'—',eur(inv.capital||0),pct(inv.split||0),eur(inv.net||0)]),
        theme:'striped',styles:{fontSize:8.5,cellPadding:2.5,font:'helvetica',textColor:BK},
        headStyles:{fillColor:DK,textColor:WH,fontStyle:'bold'},
        columnStyles:{1:{halign:'right'},2:{halign:'right'},3:{halign:'right',fontStyle:'bold'}},
        margin:{left:M,right:M}
      });
      y=doc.lastAutoTable.finalY+10;
    }

    // ── AVISO LEGAL ───────────────────────────────────────────────
    chkY(22);
    doc.setFillColor(...LG);doc.rect(M,y,W-M*2,18,'F');
    doc.setDrawColor(...LGBDR);doc.setLineWidth(0.3);doc.rect(M,y,W-M*2,18,'S');
    doc.setFont('helvetica','bold');doc.setFontSize(7);doc.setTextColor(...BK);
    doc.text('AVISO LEGAL E LIMITAÇÕES',M+3,y+5);
    doc.setFont('helvetica','normal');doc.setFontSize(6.5);doc.setTextColor(...GY);
    const disc=doc.splitTextToSize(
      'Este relatório foi preparado pela Tessa Advisors através da plataforma PropInvest Pro para fins informativos exclusivamente. '+
      'Não constitui aconselhamento financeiro, fiscal ou jurídico. Os valores apresentados são estimativas baseadas nos dados '+
      'fornecidos pelo utilizador e em pesquisa de mercado automatizada. As mais-valias e obrigações fiscais devem ser confirmadas '+
      'com contabilista ou advogado fiscal certificado. Investir em imobiliário implica riscos, incluindo perda parcial ou total do capital.',
      W-M*2-6);
    doc.text(disc,M+3,y+10);

    // ── FOOTERS EM TODAS AS PÁGINAS ───────────────────────────────
    const totalPgs=doc.internal.getNumberOfPages();
    for(let pg=1;pg<=totalPgs;pg++) addFooterPage(doc,W,H,M,pg,totalPgs,logo);

    const fname='TessaAdvisors_InvestorReport_'+
      (p.name||'Projecto').replace(/[^a-zA-Z0-9]/g,'_').slice(0,25)+
      '_'+new Date().toISOString().slice(0,10)+'.pdf';
    doc.save(fname);
    showToast('✅ Relatório PDF gerado!');
    document.getElementById('aiMod')?.remove();

  }catch(e){
    showToast('Erro PDF: '+e.message);
    console.error('PDF error:',e);
  }
}



// ── Check Share Link ───────────────────────────────────────────
function checkShareLink(){
  const sid=new URLSearchParams(location.search).get('share');
  if(!sid)return;
  if(!DB){setTimeout(checkShareLink,800);return;}
  document.body.innerHTML='<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:#09090f;color:#94a3b8;font-size:13px">A carregar...</div>';
  DB.collection('shared_reports').doc(sid).get().then(doc=>{
    if(!doc.exists){document.body.innerHTML='<div style="text-align:center;padding:60px;background:#09090f;min-height:100vh;color:#94a3b8"><div style="font-size:40px;margin-bottom:12px">🔗</div><div style="font-size:16px;font-weight:700;color:#f1f5f9">Link inválido ou expirado</div></div>';return;}
    document.open();document.write(doc.data().html);document.close();
  }).catch(e=>{document.body.innerHTML='<div style="padding:40px;color:#ef4444;text-align:center">Erro: '+e.message+'</div>';});
}
